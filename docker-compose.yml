version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: blog_db
    restart: always
    environment:
      MYSQL_DATABASE: blog_generator
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: blog_user
      MYSQL_PASSWORD: blog_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: blog_backend
    restart: always
    environment:
      - DATABASE_URL=mysql+pymysql://blog_user:blog_password@db:3306/blog_generator
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=your-super-secret-key-change-this
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: blog_frontend
    restart: always
    environment:
      - API_URL=http://backend:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
