apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: ai-blog-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ai-blog-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: blog-config
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: blog-secrets
              key: gemini-api-key
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: ai-blog-platform
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: ai-blog-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ai-blog-frontend:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: blog-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: ai-blog-platform
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
